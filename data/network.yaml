subnet: "192.168.178.0/24"
routing_mode: "Single LAN broadcast domain via bridged AP"
infrastructure:
  router:
    name: "FRITZ!Box 6591 Cable"
    role: "Router, DHCP, main Wi-Fi for phones and laptops"
    admin_url: "http://fritz.box"
    default_gateway: "192.168.178.1"
    notes: "Main router and DHCP server. Assigns fixed IPs to Shelly devices by MAC."
  access_point:
    name: "LittleJerry"
    model: "GL.iNet GL-AR300M"
    role: "Bridged Wi-Fi access point for Shelly devices"
    mode: "bridge"
    notes: "Do not enable router/NAT mode. All Shelly devices should use this SSID."
  home_assistant:
    name: "Kelder"
    model: "Lenovo ThinkCentre M900q"
    role: "Home Assistant host (Docker)"
    status: "Configured for this property"
ip_blocks:
  relays_and_switches: "80-89"
  plugs_and_power: "90-99"
  shutters: "100-119"
  lights_and_globes: "120-139"
  control_panels: "140-149"
  spare_growth: "150-199"
handover:
  include_littlejerry: true
  include_kelder: true
  router_agnostic: true
