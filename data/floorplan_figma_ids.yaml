# SVG layer naming — language-neutral room and point codes
#
# Room shapes use room_{code} where code is a two-letter zone id.
# Device point groups use points_{code}; individual points use {code}_{suffix}.
# Human-readable names live only in the app (rooms.yaml, device_points.yaml, i18n).
#
# Zone codes (ground floor):
#   of — north-west (home office)
#   ba — north-centre (bathroom)
#   la — west strip (laundry)
#   ha — central core (hallway)
#   mb — east large room (master bedroom)
#   br — south-centre (second bedroom)
#   ld — south-west large room (living/dining)
#   st — pantry cell (storage)
#
# Zone codes (basement, same SVG):
#   bm — private cellar for property 4.2
#
# Point suffix examples:
#   cp car park, fd front, ga garden, ba back deck, lo lounge, ta table, la lamp,
#   si sink, wz wizz, ki kitchen, kb kitchen bench, tv TV, re relay, li light, sw switch,
#   wd washer-dryer, ls living sofa

schema:
  room_pattern: "room_{code}"
  point_group_pattern: "points_{code}"
  point_shape_pattern: "{code}_{suffix}"
  display_code_pattern: "{CODE}-{SUFFIX}" # e.g. LD-CP

rooms:
  - svg_id: room_of
    legacy_id: Office
    app_room_id: home_office
  - svg_id: room_ba
    legacy_id: Bathroom
    app_room_id: bathroom
  - svg_id: room_la
