    legacy_id: FamilyRoom
    app_room_id: living_dining
  - svg_id: room_st
    legacy_id: Storage
    app_room_id: storage
  # room_bm removed from FloorMap.svg — basement rooms are selected on Building maps
  # (PrivateStorage / Gym / BikeRoom overlays).

