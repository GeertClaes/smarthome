services:
  smarthome:
    build: .
    container_name: smarthome
    restart: unless-stopped
    ports:
      # Host 8124 — next to Home Assistant (8123); container still listens on 3000
      - "8124:3000"
    volumes:
      # Persist admin edits (devices, rooms, floor plan points, etc.)
      - ./data:/app/data
      # Persist uploaded photos
      - ./public/uploads:/app/public/uploads
